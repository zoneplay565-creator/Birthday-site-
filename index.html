<!DOCTYPE html>
<html>
<head>
    <title>Make a Wish 🎂</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: radial-gradient(circle, #0d0d0d, #000);
            color: white;
            text-align: center;
            overflow: hidden;
        }

        /* INTRO */
        #intro {
            position: fixed;
            width: 100%;
            height: 100%;
            background: black;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10;
            animation: fadeOut 2s ease forwards;
            animation-delay: 2.5s;
        }

        #intro h1 {
            opacity: 0;
            animation: fadeIn 2s ease forwards;
        }

        @keyframes fadeIn { to { opacity: 1; } }
        @keyframes fadeOut { to { opacity: 0; visibility: hidden; } }

        /* MAIN */
        #main {
            display: none;
            padding-top: 50px;
        }

        .cake {
            margin-top: 80px;
        }

        .candle {
            width: 20px;
            height: 80px;
            background: linear-gradient(to bottom, #fff, #ddd);
            margin: auto;
            border-radius: 5px;
            position: relative;
        }

        .flame {
            width: 20px;
            height: 30px;
            background: radial-gradient(circle, yellow, orange, red);
            border-radius: 50%;
            position: absolute;
            top: -30px;
            animation: flicker 0.2s infinite alternate;
        }

        @keyframes flicker {
            from { transform: scale(1); }
            to { transform: scale(1.2); }
        }

        .base {
            width: 200px;
            height: 80px;
            background: #ff4b5c;
            border-radius: 20px;
            margin: 10px auto;
        }

        button {
            margin-top: 30px;
            padding: 12px 25px;
            border: none;
            border-radius: 25px;
            background: #ff4b5c;
            color: white;
            cursor: pointer;
        }

        #wish {
            margin-top: 20px;
            font-size: 22px;
            opacity: 0;
            transition: opacity 1s ease;
        }
    </style>
</head>

<body>

<!-- INTRO -->
<div id="intro">
    <h1>Make a Wish...</h1>
</div>

<!-- MAIN -->
<div id="main">
    <h1>🎂 Blow the Candle 🎂</h1>

    <div class="cake">
        <div class="candle">
            <div class="flame" id="flame"></div>
        </div>
        <div class="base"></div>
    </div>

    <button onclick="blowCandle()">Blow Candle 💨</button>

    <div id="wish">✨ Your wish will come true ✨</div>
</div>

<script>
    // Intro → main
    setTimeout(() => {
        document.getElementById("intro").style.display = "none";
        document.getElementById("main").style.display = "block";
    }, 3000);

    function blowCandle() {
        document.getElementById("flame").style.display = "none";
        document.getElementById("wish").style.opacity = "1";

        setTimeout(() => {
            window.location.href = "main.html";
        }, 2000);
    }
</script>

</body>
</html>
