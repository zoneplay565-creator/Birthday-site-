<!DOCTYPE html>
<html>
<head>
    <title>Make a Wish 🎂</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: radial-gradient(circle, #111, #000);
            color: white;
            text-align: center;
            overflow: hidden;
        }

        /* INTRO */
        #intro {
            position: fixed;
            width: 100%;
            height: 100%;
            background: black;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10;
            animation: fadeOut 2s ease forwards;
            animation-delay: 3s;
        }

        #intro h1 {
            opacity: 0;
            animation: fadeIn 2s ease forwards;
        }

        @keyframes fadeIn { to { opacity: 1; } }
        @keyframes fadeOut { to { opacity: 0; visibility: hidden; } }

        /* MAIN */
        #main {
            display: none;
            padding-top: 50px;
        }

        /* CAKE (REALISTIC) */
        .cake {
            position: relative;
            margin-top: 100px;
        }

        .base {
            width: 220px;
            height: 100px;
            background: linear-gradient(to bottom, #fff5e6, #f2d3b3);
            border-radius: 20px;
            margin: auto;
            position: relative;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
        }

        .base::before {
            content: "";
            position: absolute;
            top: -20px;
            width: 100%;
            height: 30px;
            background: #fff;
            border-radius: 50%;
        }

        .candle {
            width: 12px;
            height: 70px;
            background: linear-gradient(to bottom, #ff4b5c, #b30021);
            border-radius: 4px;
            position: absolute;
            top: -80px;
            left: 50%;
            transform: translateX(-50%);
        }

        .flame {
            width: 16px;
            height: 26px;
            background: radial-gradient(circle, #fff176, #ff9800, #ff3d00);
            border-radius: 50%;
            position: absolute;
            top: -30px;
            left: -2px;
            animation: flicker 0.15s infinite alternate;
        }

        .flame::after {
            content: "";
            position: absolute;
            width: 30px;
            height: 30px;
            background: rgba(255,150,0,0.3);
            border-radius: 50%;
            top: -5px;
            left: -7px;
            filter: blur(8px);
        }

        @keyframes flicker {
            from { transform: scale(1); }
            to { transform: scale(1.2); }
        }

        /* BUTTON */
        button {
            margin-top: 40px;
            padding: 12px 25px;
            border: none;
            border-radius: 25px;
            background: #ff4b5c;
            color: white;
            font-size: 16px;
            cursor: pointer;
        }

        /* TEXT */
        #status {
            margin-top: 20px;
            opacity: 0.7;
        }

        #wish {
            margin-top: 25px;
            font-size: 22px;
            opacity: 0;
            transition: opacity 1s ease;
        }
    </style>
</head>

<body>

<!-- INTRO -->
<div id="intro">
    <h1>Make a Wish...</h1>
</div>

<!-- MAIN -->
<div id="main">
    <h1>🎂 Blow the Candle 🎂</h1>

    <div class="cake">
        <div class="candle">
            <div class="flame" id="flame"></div>
        </div>
        <div class="base"></div>
    </div>

    <button onclick="blowCandle()">Blow Manually 💨</button>

    <div id="status">🎤 Tap anywhere to enable mic</div>
    <div id="wish">✨ Your wish will come true ✨</div>
</div>

<script>
    // INTRO TRANSITION
    setTimeout(() => {
        document.getElementById("intro").style.display = "none";
        document.getElementById("main").style.display = "block";
        document.body.style.overflow = "auto";
    }, 4000);

    // MIC DETECTION (CLEAN VERSION)
    let audioContext, analyser;

    document.body.addEventListener("click", async () => {
        if (!audioContext) {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });

                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                const mic = audioContext.createMediaStreamSource(stream);

                analyser = audioContext.createAnalyser();
                analyser.fftSize = 256;

                mic.connect(analyser);

                detectBlow();
                document.getElementById("status").innerText = "🎤 Blow into mic...";
            } catch {
                document.getElementById("status").innerText = "Mic access denied ❌";
            }
        }
    });

    function detectBlow() {
        const data = new Uint8Array(analyser.frequencyBinCount);

        function check() {
            analyser.getByteFrequencyData(data);

            let volume = data.reduce((a, b) => a + b) / data.length;

            if (volume > 60) {
                blowCandle();
                return;
            }

            requestAnimationFrame(check);
        }

        check();
    }

    function blowCandle() {
        document.getElementById("flame").style.display = "none";
        document.getElementById("wish").style.opacity = "1";
        document.getElementById("status").innerText = "🎉 Wish granted!";
    }
</script>

</body>
</html>
