<!DOCTYPE html>
<html>
<head>
    <title>Make a Wish 🎂</title>

    <style>
        body {
            margin: 0;
            background: radial-gradient(circle, #1a1a1a, #000);
            color: white;
            font-family: Arial;
            text-align: center;
        }

        h1 {
            margin-top: 50px;
        }

        .cake {
            margin-top: 80px;
        }

        .candle {
            width: 20px;
            height: 80px;
            background: linear-gradient(to bottom, #fff, #ddd);
            margin: auto;
            border-radius: 5px;
            position: relative;
        }

        .flame {
            width: 20px;
            height: 30px;
            background: radial-gradient(circle, yellow, orange, red);
            border-radius: 50%;
            position: absolute;
            top: -30px;
            animation: flicker 0.2s infinite alternate;
        }

        @keyframes flicker {
            from { transform: scale(1); }
            to { transform: scale(1.2); }
        }

        .base {
            width: 200px;
            height: 80px;
            background: #ff4b5c;
            border-radius: 20px;
            margin: 10px auto;
        }

        button {
            margin-top: 30px;
            padding: 12px 25px;
            border: none;
            border-radius: 25px;
            background: #ff4b5c;
            color: white;
            cursor: pointer;
        }

        #wish {
            margin-top: 20px;
            font-size: 22px;
            opacity: 0;
            transition: opacity 1s ease;
        }
    </style>
</head>

<body>

<h1>🎂 Make a Wish & Blow the Candle 🎂</h1>

<div class="cake">
    <div class="candle">
        <div class="flame" id="flame"></div>
    </div>
    <div class="base"></div>
</div>

<button onclick="blowCandle()">Blow Candle 💨</button>

<div id="wish">✨ Your wish will come true ✨</div>

<script>
function blowCandle() {
    document.getElementById("flame").style.display = "none";
    document.getElementById("wish").style.opacity = "1";

    // 👉 Redirect to birthday page after 2.5 sec
    setTimeout(() => {
        window.location.href = "main.html";
    }, 2500);
}
</script>

</body>
</html>
