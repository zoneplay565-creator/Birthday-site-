<!DOCTYPE html>
<html>
<head>
    <title>Make a Wish 🎂</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: radial-gradient(circle, #0d0d0d, #000);
            color: white;
            text-align: center;
            overflow: hidden;
        }

        /* INTRO SCREEN */
        #intro {
            position: fixed;
            width: 100%;
            height: 100%;
            background: black;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10;
            animation: fadeOut 2s ease forwards;
            animation-delay: 2.5s;
        }

        #intro h1 {
            font-size: 26px;
            opacity: 0;
            animation: fadeIn 2s ease forwards;
        }

        @keyframes fadeIn { to { opacity: 1; } }
        @keyframes fadeOut { to { opacity: 0; visibility: hidden; } }

        /* MAIN */
        #main {
            display: none;
            padding-top: 40px;
        }

        /* CAKE */
        .cake {
            position: relative;
            margin-top: 100px;
        }

        .base {
            width: 240px;
            height: 110px;
            background: linear-gradient(to bottom, #fff3e0, #e0a96d);
            border-radius: 20px;
            margin: auto;
            position: relative;
            box-shadow: 0 20px 40px rgba(0,0,0,0.7);
        }

        .cream {
            position: absolute;
            top: -20px;
            width: 100%;
            height: 40px;
            background: white;
            border-radius: 50%;
        }

        .candle {
            width: 12px;
            height: 70px;
            background: linear-gradient(to bottom, #ff4b5c, #8b0000);
            position: absolute;
            top: -80px;
            left: 50%;
            transform: translateX(-50%);
            border-radius: 4px;
        }

        .flame {
            width: 16px;
            height: 26px;
            background: radial-gradient(circle, #fff176, #ff9800, #ff3d00);
            border-radius: 50%;
            position: absolute;
            top: -30px;
            left: -2px;
            animation: flicker 0.15s infinite alternate;
        }

        .glow {
            position: absolute;
            width: 40px;
            height: 40px;
            background: rgba(255,150,0,0.3);
            border-radius: 50%;
            top: -38px;
            left: -14px;
            filter: blur(10px);
        }

        @keyframes flicker {
            from { transform: scale(1); }
            to { transform: scale(1.2); }
        }

        button {
            margin-top: 40px;
            padding: 12px 30px;
            border: none;
            border-radius: 25px;
            background: #ff4b5c;
            color: white;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background: #ff2e44;
        }

        #status {
            margin-top: 15px;
            opacity: 0.6;
        }

        #wish {
            margin-top: 20px;
            font-size: 22px;
            opacity: 0;
            transition: opacity 1s ease;
        }
    </style>
</head>

<body>

<!-- INTRO -->
<div id="intro">
    <h1>Make a Wish...</h1>
</div>

<!-- MAIN -->
<div id="main">
    <h1>🎂 Blow the Candle 🎂</h1>

    <div class="cake">
        <div class="candle">
            <div class="flame" id="flame"></div>
            <div class="glow" id="glow"></div>
        </div>
        <div class="base">
            <div class="cream"></div>
        </div>
    </div>

    <button onclick="blowCandle()">Blow Candle 💨</button>

    <div id="status">Tap button to blow</div>
    <div id="wish">✨ Your wish will come true ✨</div>
</div>

<script>
    // Intro transition
    setTimeout(() => {
        document.getElementById("intro").style.display = "none";
        document.getElementById("main").style.display = "block";
        document.body.style.overflow = "auto";
    }, 3000);

    function blowCandle() {
        document.getElementById("flame").style.display = "none";
        document.getElementById("glow").style.display = "none";

        document.getElementById("wish").style.opacity = "1";
        document.getElementById("status").innerText = "🎉 Redirecting...";

        // Go to birthday page
        setTimeout(() => {
            window.location.href = "main.html";
        }, 2000);
    }
</script>

</body>
</html>
